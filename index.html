<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Contact form</title>
</head>

<body>
   <div id="success" style="display: none">
      <p><img  src="assets/images/icon-success-check.svg"/><span>Message Sent!</span></p>
      <p>Thanks for completing the form. We'll be in touch soon!</p>
    </diV>
  <div class="attribution">
    <form>
      <p>Contact Us</p>
      <div class="name">
        <div class="names">
          <label>First Name</label>
          <input type="name" id="firstname" placeholder="First Name" required/>
          <b id="e-fname"></b>
        </div>

        <div class="names">
          <label>Last Name</label>
          <input type="name" id="lastname" placeholder="Last Name" required/>
          <b id="e-lname"></b>
        </div>

      </div>


      <div class="email">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Email" required/>
        <b id="email-error"></b>
     </div>

    
        <div class="query">
        <label>Query Type</label>
        <div class="name">
        <label for="ge" class="option"><input type="radio" id="ge" value="General Enquiry" name="query" /> <p>General Enquiry</p></label>
         <label for="sr" class="option"> <input type="radio" id="sr" value="Support Request" name="query" /><p>Support Request</p></label>
        </div>
        <b id="q-error"></b>
        </div>

        <div class="naming">
        <label>Message</label>
        <textarea name="message" id="message"></textarea>
        <b id="m_error"></b>
        </div>

        <div class="naming">
         <label class="consent"> <input type="checkbox" id="checkbox"/><p>I consent to being contacted by the team</p></label>

        <b id="c-error"></b>
        </div>
        <button onclick="test()">Submit</button>

    </form>
  </div>
  
</body>

</html>
